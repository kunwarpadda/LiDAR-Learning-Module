<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Interactive learning resource about how LiDAR uses laser pulses, time-of-flight, and point clouds to measure the world."
    >
    <title>How LiDAR Measures the World</title>
    <link rel="stylesheet" href="assets/lidar-learning-module.css">
    <style>
      body {
        background: #ffffff;
        margin: 0;
      }

      .site-shell {
        min-height: 100vh;
      }

      .site-loading {
        color: #111111;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0 auto;
        max-width: 760px;
        padding: 48px 24px;
      }
    </style>
  </head>
  <body>
    <div class="site-shell" id="site-root">
      <p class="site-loading">Loading LiDAR learning module...</p>
    </div>

    <script src="assets/lidar-learning-module.js" defer></script>
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        fetch('templates/module.html')
          .then(function (response) {
            if (!response.ok) {
              throw new Error('Module template could not be loaded.');
            }
            return response.text();
          })
          .then(function (html) {
            document.getElementById('site-root').innerHTML = html;
            if (window.LidarLearningModule) {
              window.LidarLearningModule.initAll();
            }
          })
          .catch(function () {
            document.getElementById('site-root').innerHTML =
              '<main class="site-loading"><h1>How LiDAR Measures the World</h1><p>The learning module could not load. Check that templates/module.html is deployed with this page.</p></main>';
          });
      });
    </script>
  </body>
</html>
